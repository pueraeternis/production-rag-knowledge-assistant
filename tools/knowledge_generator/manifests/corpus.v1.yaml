      "required_facts": [
        "AI Platform Overview documents how AcmeCloud's AI Platform organization designs, deploys, and operates the platform services behind customer-facing products.",
        "This architecture spans regional cells (`us-east`, `us-west`, `eu-central`) and integrates with internal systems: Orion, Harbor, Gatehouse.",
        "AI Platform validated overview on Orion in `eu-central` during the Q1 game day; notes in DOCS-4485.",
        "Architecture review referenced overview when approving the `eu-central` Orion change window (DOCS-1373).",
        "Core components include Orion, Harbor, Gatehouse, each with distinct ownership boundaries and SLO dashboards in Beacon.",
        "Regarding **Orion model serving**: Orion deploys through canary channels (5% → 25% → 100%) with GPU scheduling quotas enforced per workspace via Ledger meters. Cell `eu-central` runs staged validation on Orion before Atlas promotes configuration; rollback steps must be attached to DOCS-4449.",
        "**Feature store integration** — Offline Harbor features feed online Orion serving; point-in-time joins validated in CI before promotion. In production, AI Platform validates this through Harbor dashboards in cell `us-east` before quarterly review; changes are tracked under DOCS-1069.",
        "Regarding **Model registry and training**: Training pipelines write artifacts to the registry; only promoted versions receive Atlas routes to Orion production cells. Cell `us-west` runs staged validation on Gatehouse before Atlas promotes configuration; rollback steps must be attached to DOCS-7497."
      ],
      "min_words": 975
